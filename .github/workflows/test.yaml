name: GitHub API Testing
on:
  push:
    branches:
      - master

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Test
        run: |
            curl -L \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              -H "Authorization: ${GITHUB_TOKEN}" \
              https://api.github.com/installation/repositories
